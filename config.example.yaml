# SeePhoto 配置文件
# 复制为 config.yaml 并填入你的 API Key

server:
  host: "0.0.0.0"
  port: 8000

# 目标文本模型 API（默认 DeepSeek，可改为任意 OpenAI 兼容接口）
target:
  url: "https://api.deepseek.com"
  api_key: "sk-your-deepseek-api-key"
  model: "deepseek-chat"

# OCR 引擎选择
ocr:
  # paddleocr | easyocr
  engine: paddleocr
  # PaddleOCR: ch, EasyOCR: ['ch_sim', 'en']
  lang: "ch"
  # 图片最大尺寸（像素）
  max_size: 2048
